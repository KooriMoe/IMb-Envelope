<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Save your tracking information</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/mdui@1.0.2/dist/css/mdui.min.css" />
  <style>
    body {
      background: linear-gradient(135deg, #f7f8fb 0%, #eef1f7 100%);
    }

    .main-content {
      padding-top: 72px;
      padding-bottom: 48px;
      max-width: 900px;
    }

    .section-card {
      border-radius: 16px;
    }

    .button-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }

    .grid-2 {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 16px;
    }
  </style>
</head>

<body class="mdui-theme-primary-indigo mdui-theme-accent-amber mdui-typo">
  <div class="mdui-appbar mdui-appbar-fixed">
    <div class="mdui-toolbar mdui-color-theme">
      <a href="/" class="mdui-btn mdui-btn-icon" aria-label="Back">
        <i class="mdui-icon material-icons">arrow_back</i>
      </a>
      <span class="mdui-typo-title">Tracking Information</span>
    </div>
  </div>

  <div class="mdui-container main-content">
    <div class="mdui-card section-card mdui-m-b-4">
      <div class="mdui-card-primary">
        <div class="mdui-card-primary-title">Save these details</div>
        <div class="mdui-card-primary-subtitle">You will need them to track the mail later.</div>
      </div>
      <div class="mdui-card-content">
        <div class="mdui-typo-subheading">Serial</div>
        <div class="mdui-typo-title mdui-text-color-theme">{{serial}}</div>
        <div class="mdui-divider mdui-m-y-2"></div>
        <div class="mdui-typo-subheading">Receipt ZIP</div>
        <div class="mdui-typo-title mdui-text-color-theme">{{recipient_zip}}</div>
      </div>
    </div>

    <div class="mdui-card section-card mdui-m-b-4">
      <div class="mdui-card-primary">
        <div class="mdui-card-primary-title">Download envelope</div>
        <div class="mdui-card-primary-subtitle">Choose HTML or PDF</div>
      </div>
      <div class="mdui-card-content">
        <div class="button-row">
          <a class="mdui-btn mdui-ripple mdui-color-theme" href="/download/envelope/html">
            Download HTML
          </a>
          <a class="mdui-btn mdui-ripple mdui-btn-outlined" href="/download/envelope/pdf">
            Download PDF
          </a>
        </div>
      </div>
    </div>

    <div class="mdui-card section-card">
      <div class="mdui-card-primary">
        <div class="mdui-card-primary-title">Download Avery 8163 sticker</div>
        <div class="mdui-card-primary-subtitle">Select row and column</div>
      </div>
      <div class="mdui-card-content grid-2">
        <form action="/download/avery/html" method="get">
          <div class="mdui-textfield">
            <label class="mdui-textfield-label" for="row-html">Row (1-5)</label>
            <input class="mdui-textfield-input" type="number" id="row-html" name="row" min="1" max="5" />
          </div>
          <div class="mdui-textfield">
            <label class="mdui-textfield-label" for="col-html">Column (1-2)</label>
            <input class="mdui-textfield-input" type="number" id="col-html" name="col" min="1" max="2" />
          </div>
          <button type="submit" class="mdui-btn mdui-ripple mdui-color-theme">Download HTML</button>
        </form>

        <form action="/download/avery/pdf" method="get">
          <div class="mdui-textfield">
            <label class="mdui-textfield-label" for="row-pdf">Row (1-5)</label>
            <input class="mdui-textfield-input" type="number" id="row-pdf" name="row" min="1" max="5" />
          </div>
          <div class="mdui-textfield">
            <label class="mdui-textfield-label" for="col-pdf">Column (1-2)</label>
            <input class="mdui-textfield-input" type="number" id="col-pdf" name="col" min="1" max="2" />
          </div>
          <button type="submit" class="mdui-btn mdui-ripple mdui-btn-outlined">Download PDF</button>
        </form>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/mdui@1.0.2/dist/js/mdui.min.js"></script>
</body>

</html>
